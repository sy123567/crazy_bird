version: '3.8'

services:
  crazy_bird:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crazy_bird_game
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    networks:
      - crazy_bird_network

networks:
  crazy_bird_network:
    driver: bridge